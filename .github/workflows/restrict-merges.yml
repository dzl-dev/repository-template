name: Restrict PR Source Branches
on:
  pull_request:
    branches:
      - staging # The branch you want to protect

jobs:
  check-source-branch:
    runs-on: 
    steps:
      - name: Verify Allowed Source Branch
        if: github.head_ref != 'testing' # The ONLY branch allowed to merge into main
        run: |
          echo "ERROR: You can only merge into 'staging' from the 'testing' branch."
          echo "Your current source branch is: ${{ github.head_ref }}"
          exit 1
