name: Pure GitHub Build and Artifact Pipeline

on:
  push:
    branches:
      - main
      - staging
      - testing
      - dev

permissions:
  contents: read

jobs:
  set-environment:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.determine-env.outputs.target_env }}
    steps:
      - name: Determine Target Environment
        id: determine-env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "target_env=production" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "target_env=staging" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "testing" ]; then
            echo "target_env=testing" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            echo "target_env=development" >> $GITHUB_OUTPUT
          fi

  compile-and-package:
    needs: set-environment
    runs-on: ubuntu-latest
    # Binds the execution to GitHub environment release gates
    environment: ${{ needs.set-environment.outputs.env_name }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Quality Verification Tests
        run: npm test

      - name: Build Application Package
        run: npm run build

      - name: Archive and Publish Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-build-${{ needs.set-environment.outputs.env_name }}
          path: dist/ # The directory containing your built application code
          retention-days: 30 # Retains the build package on GitHub for 30 days
