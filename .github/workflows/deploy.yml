name: Multi-Environment Deployment

on:
  push:
    branches:
      - main
      - staging
      - testing
      - dev

jobs:
  set-environment:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.determine-env.outputs.target_env }}
    steps:
      - name: Determine Target Environment
        id: determine-env
        run: |
          if [ "${{ github.ref_ref_name }}" = "main" ]; then
            echo "target_env=production" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "target_env=staging" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "testing" ]; then
            echo "target_env=testing" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            echo "target_env=development" >> $GITHUB_OUTPUT
          fi

  build-and-deploy:
    needs: set-environment
    runs-on: ubuntu-latest
    # Tells GitHub which environment secrets/variables to load
    environment: ${{ needs.set-environment.outputs.env_name }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Build
        run: npm run build

      - name: Deploy to Environment Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          # GitHub automatically fetches the secret belonging to the active environment
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Deploying code from branch: ${{ github.ref_name }} to ${{ needs.set-environment.outputs.env_name }}"
            cd /var/www/apps/${{ needs.set-environment.outputs.env_name }}
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            npm install --production
            pm2 restart ${{ needs.set-environment.outputs.env_name }}-app
